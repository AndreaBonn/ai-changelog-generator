name: Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check changelog/ tests/ generate.py

      - name: Format check
        run: uv run ruff format --check changelog/ tests/ generate.py

      - name: Type check
        run: uv run mypy changelog/ generate.py

      - name: Test with coverage
        run: uv run pytest tests/ -v --junitxml=test-results.xml --cov=changelog --cov-report=json --cov-report=term-missing

      - name: Generate test badge
        if: always()
        run: |
          python -c "
          import json, xml.etree.ElementTree as ET, os
          if not os.path.exists('test-results.xml'):
              badge = {'schemaVersion': 1, 'label': 'tests', 'message': 'error', 'color': 'red'}
          else:
              root = ET.parse('test-results.xml').getroot()
              suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
              tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
              failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
              errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
              passed = tests - failures - errors
              badge = {
                  'schemaVersion': 1,
                  'label': 'tests',
                  'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
                  'color': 'red' if failures + errors > 0 else 'brightgreen'
              }
          os.makedirs('badges', exist_ok=True)
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Generate coverage badge
        if: always()
        run: |
          python -c "
          import json, os
          summary_path = 'coverage.json'
          if not os.path.exists(summary_path):
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': 'N/A', 'color': 'lightgrey'}
          else:
              with open(summary_path) as f:
                  data = json.load(f)
              pct = data['totals']['percent_covered_display']
              pct_float = float(str(pct).rstrip('%'))
              if pct_float >= 90:
                  color = 'brightgreen'
              elif pct_float >= 80:
                  color = 'green'
              elif pct_float >= 60:
                  color = 'yellow'
              else:
                  color = 'red'
              badge = {
                  'schemaVersion': 1,
                  'label': 'coverage',
                  'message': f'{pct}%' if '%' not in str(pct) else str(pct),
                  'color': color
              }
          os.makedirs('badges', exist_ok=True)
          with open('badges/coverage-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badges
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json badges/coverage-badge.json
          git diff --cached --quiet || git commit -m "ci: update badges [skip ci]"
          git push
