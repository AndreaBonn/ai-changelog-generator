name: Tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check changelog/ tests/ generate.py

      - name: Format check
        run: uv run ruff format --check changelog/ tests/ generate.py

      - name: Type check
        run: uv run mypy changelog/ generate.py

      - name: Test with coverage
        run: uv run pytest tests/ -v --cov=changelog --cov-report=json --cov-report=term-missing
