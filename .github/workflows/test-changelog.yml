name: Test Changelog

on:
  workflow_dispatch:

jobs:
  test-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./
        with:
          llm_provider: 'groq,groq,gemini'
          llm_api_key: ${{ secrets.GROQ_API_KEY }},${{ secrets.GROQ_API_KEY_2 }},${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          language: 'english'
